name: Scheduled Weather Discord Push

on:
  schedule:
    # 早上 2 点 (北京时间) = 18:00 (UTC) 前一天
    - cron: '0 18 * * *'
    # 早上 8 点 (北京时间) = 00:00 (UTC) 当天
    - cron: '0 0 * * *'
    # 下午 5 点 (北京时间) = 09:00 (UTC) 当天
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Which day to push (auto will detect based on current Beijing time)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - today
          - tomorrow

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Install Chinese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-microhei fonts-wqy-zenhei

      - name: Start Weather API Server
        env:
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
          GRIBSTREAM_API_KEY: ${{ secrets.GRIBSTREAM_API_KEY }}
        run: |
          python main.py &
          # 等待服务器完全启动
          for i in {1..30}; do
            curl -s http://127.0.0.1:8000/api/forecast/daily > /dev/null && break
            echo "Waiting for server to start..."
            sleep 1
          done

      - name: Determine Push Day
        id: determine_day
        run: |
          INPUT_DAY="${{ github.event.inputs.day }}"
          if [ "$INPUT_DAY" = "auto" ] || [ -z "$INPUT_DAY" ]; then
            # 自动模式或定时触发时，根据北京时间 (UTC+8) 小时判定推送天数
            HOUR_BJ=$(TZ=Asia/Shanghai date +%H)
            echo "Beijing Hour: $HOUR_BJ"
            # 下午 17 点至晚上 23 点之间触发的均视为下午/晚上推送，发送明天预报
            if [ "$HOUR_BJ" -ge 16 ] && [ "$HOUR_BJ" -le 23 ]; then
              echo "day=tomorrow" >> $GITHUB_OUTPUT
            else
              echo "day=today" >> $GITHUB_OUTPUT
            fi
          else
            # 强制指定的天数 (today / tomorrow)
            echo "day=$INPUT_DAY" >> $GITHUB_OUTPUT
          fi


      - name: Send Weather Forecast to Lark
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
          GRIBSTREAM_API_KEY: ${{ secrets.GRIBSTREAM_API_KEY }}
        run: |
          python lark_webhook.py ${{ steps.determine_day.outputs.day }}

      - name: Upload Weather Card Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: weather-card-${{ steps.determine_day.outputs.day }}
          path: cache/weather_mobile_${{ steps.determine_day.outputs.day }}.png
