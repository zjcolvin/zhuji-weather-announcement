name: Scheduled Weather Discord Push

on:
  schedule:
    # 早上 6 点 (北京时间) = 22:00 (UTC) 前一天
    - cron: '0 22 * * *'
    # 中午 12 点 (北京时间) = 04:00 (UTC) 当天
    - cron: '0 4 * * *'
    # 晚上 22 点 (北京时间) = 14:00 (UTC) 当天
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Which day to push'
        required: true
        default: 'today'
        type: choice
        options:
          - today
          - tomorrow

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Install Chinese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-microhei fonts-wqy-zenhei

      - name: Start Weather API Server
        env:
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
          GRIBSTREAM_API_KEY: ${{ secrets.GRIBSTREAM_API_KEY }}
        run: |
          python main.py &
          # 等待服务器完全启动
          for i in {1..30}; do
            curl -s http://127.0.0.1:8000/api/forecast/daily > /dev/null && break
            echo "Waiting for server to start..."
            sleep 1
          done

      - name: Determine Push Day
        id: determine_day
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "day=${{ github.event.inputs.day }}" >> $GITHUB_OUTPUT
          else
            # 获取北京时间 (UTC+8) 小时，以确保在 Action 偶尔排队延迟时依然能准确判定
            HOUR_BJ=$(TZ=Asia/Shanghai date +%H)
            echo "Beijing Hour: $HOUR_BJ"
            # 北京时间 21点至 23点 之间触发的均视为晚上 22 点推送，发送明天预报
            if [ "$HOUR_BJ" -ge 21 ] && [ "$HOUR_BJ" -le 23 ]; then
              echo "day=tomorrow" >> $GITHUB_OUTPUT
            else
              echo "day=today" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send Weather Forecast to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
          GRIBSTREAM_API_KEY: ${{ secrets.GRIBSTREAM_API_KEY }}
        run: |
          python discord_webhook.py ${{ steps.determine_day.outputs.day }}

      - name: Send Weather Forecast to Lark
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
          GRIBSTREAM_API_KEY: ${{ secrets.GRIBSTREAM_API_KEY }}
        run: |
          python lark_webhook.py ${{ steps.determine_day.outputs.day }}

      - name: Upload Weather Card Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: weather-card-${{ steps.determine_day.outputs.day }}
          path: cache/weather_mobile_${{ steps.determine_day.outputs.day }}.png
